<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOX Admin - OOO</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' ry='6' fill='%23FFFFFF'/%3E%3Crect x='1' y='1' width='30' height='30' rx='5' ry='5' fill='%23F5E642'/%3E%3Cpath d='M8 9 L16 23 L24 9' stroke='%231A1A1A' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --yellow: #F5E642;
      --black: #1A1A1A;
      --white: #FFFFFF;
      --gray-bg: #F5F5F3;
      --gray-hover: #E8E8E6;
      --gray-border: #D4D4D0;
      --gray-text: #666666;
      --red: #E53935;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--gray-bg);
      color: var(--black);
      min-height: 100vh;
    }

    /* ========== HEADER ========== */
    .header {
      background: var(--gray-bg);
      border-bottom: 1px solid var(--gray-border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-letters {
      display: flex;
      font-family: 'Sora', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
    }

    .logo-letter {
      display: inline-block;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .logo-letters:hover .logo-letter:nth-child(1) { 
      transform: translate(-4px, -6px) rotate(-12deg); 
    }
    .logo-letters:hover .logo-letter:nth-child(2) { 
      transform: translateY(5px) rotate(8deg); 
    }
    .logo-letters:hover .logo-letter:nth-child(3) { 
      transform: translate(4px, -4px) rotate(15deg); 
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-email {
      color: var(--gray-text);
      font-size: 14px;
    }

    /* ========== BUTTONS - OUTLINE STYLE ========== */
    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--gray-border);
      color: var(--black);
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    .btn:hover svg {
      stroke: var(--white);
    }

    .btn-primary {
      border-color: var(--black);
    }

    .btn-blue {
      border-color: var(--black);
    }

    .btn-danger {
      border-color: var(--gray-border);
      color: var(--red);
    }

    .btn-danger:hover {
      background: var(--red);
      border-color: var(--red);
      color: var(--white) !important;
    }

    .btn-danger:hover svg {
      stroke: var(--white);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 8px;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:disabled {
      cursor: not-allowed;
    }

    .btn-danger:disabled {
      color: var(--red);
    }

    /* ========== LOGIN ========== */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--gray-bg);
    }

    .login-card {
      background: var(--gray-bg);
      border: 1px solid var(--gray-border);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 400px;
    }

    .login-card h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .login-card p {
      color: var(--gray-text);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--gray-border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      background: transparent;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--black);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
    }

    .error-message {
      border: 1px solid var(--red);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      background: transparent;
    }

    /* ========== MAIN CONTENT ========== */
    .main {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: transparent;
      border-radius: 12px;
      padding: 20px 24px;
      flex: 1;
      border: 1px solid var(--gray-border);
    }

    .stat-card h3 {
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
    }

    .stat-card .subtext {
      font-size: 13px;
      color: var(--gray-text);
      margin-top: 4px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid var(--gray-border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      background: transparent;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--black);
    }

    .search-box svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-text);
    }

    .filter-select {
      padding: 12px 16px;
      border: 1px solid var(--gray-border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      background: transparent;
      min-width: 180px;
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--black);
    }

    .toolbar-actions {
      display: flex;
      gap: 12px;
    }

    /* Table */
    .table-container {
      background: transparent;
      border-radius: 12px;
      border: 1px solid var(--gray-border);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--gray-border);
    }

    .table-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .selected-count {
      font-size: 14px;
      color: var(--gray-text);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray-text);
      background: transparent;
      border-bottom: 1px solid var(--gray-border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover {
      color: var(--black);
    }

    th svg {
      display: inline-block;
      vertical-align: middle;
      margin-left: 4px;
      opacity: 0.5;
    }

    th.sorted svg {
      opacity: 1;
    }

    td {
      padding: 16px 20px;
      font-size: 14px;
      border-bottom: 1px solid var(--gray-border);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: var(--gray-hover);
    }

    tr.selected td {
      background: var(--gray-hover);
    }

    .checkbox-cell {
      width: 48px;
      text-align: center;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: 1px solid var(--gray-border);
      border-radius: 4px;
      position: relative;
    }

    input[type="checkbox"]:checked {
      background: var(--black);
      border-color: var(--black);
    }

    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .file-name {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .location-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 400;
    }

    .file-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--gray-border);
      background: transparent;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tx-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--gray-border);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tx-badge:hover {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    .tx-badge:hover svg {
      stroke: var(--white);
    }

    .tx-badge-pending {
      color: var(--gray-text);
      border-style: dashed;
      cursor: default;
    }

    .tx-badge-pending:hover {
      background: transparent;
      color: var(--gray-text);
    }

    .notes-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--gray-text);
    }

    .notes-indicator svg {
      width: 14px;
      height: 14px;
    }

    .actions-cell {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Empty State */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      color: var(--gray-text);
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--gray-text);
      font-size: 14px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--gray-bg);
      border: 1px solid var(--gray-border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      transform: scale(0.95);
      transition: transform 0.2s ease;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal h3 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .modal p {
      color: var(--gray-text);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-border);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--black);
      color: var(--white);
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1001;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: var(--red);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 12px 16px;
      }

      .main {
        padding: 16px;
      }

      .stats-bar {
        flex-direction: column;
        gap: 12px;
      }

      .toolbar {
        flex-direction: column;
      }

      .search-box {
        min-width: 100%;
      }

      .table-container {
        overflow-x: auto;
      }

      table {
        min-width: 800px;
      }
    }

    /* ========== TABS ========== */
    .nav-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border: 1px solid var(--gray-border);
      border-radius: 10px;
      overflow: hidden;
      width: fit-content;
    }

    .nav-tab {
      padding: 10px 24px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: none;
      border-right: 1px solid var(--gray-border);
      color: var(--gray-text);
      transition: all 0.15s ease;
    }

    .nav-tab:last-child {
      border-right: none;
    }

    .nav-tab:hover {
      background: var(--gray-hover);
      color: var(--black);
    }

    .nav-tab.active {
      background: var(--black);
      color: var(--white);
    }

    /* ========== TRANSCRIPTION ========== */
    .tx-config {
      border: 1px solid var(--gray-border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    .tx-config label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .tx-config input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      background: transparent;
    }

    .tx-config input:focus {
      outline: none;
      border-color: var(--black);
    }

    .tx-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn-green {
      border-color: #2ecc71;
      color: #2ecc71;
    }

    .btn-green:hover {
      background: #2ecc71;
      border-color: #2ecc71;
      color: var(--white);
    }

    .tx-progress {
      width: 100%;
      height: 6px;
      background: var(--gray-border);
      border-radius: 3px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .tx-progress-fill {
      height: 100%;
      background: var(--black);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }

    .tx-log {
      border: 1px solid var(--gray-border);
      border-radius: 12px;
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.8;
    }

    .tx-log-entry {
      padding: 2px 0;
      border-bottom: 1px solid var(--gray-hover);
    }

    .tx-log-ok { color: #2ecc71; }
    .tx-log-err { color: var(--red); }
    .tx-log-info { color: #3498db; }
    .tx-log-warn { color: #f39c12; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ========== SUPABASE CONFIG ==========
    const SUPABASE_URL = 'https://ifikwaymnmouvpmbvuqz.supabase.co';

    // ========== RENDER FUNCTIONS ==========
    function render() {
      const app = document.getElementById('app');
      
      if (state.loading) {
        app.innerHTML = renderLoading();

      if (!state.user) {

    function renderLoading() {
      return `

          <div class="spinner"></div>

    }

    function renderLogin() {
      return `
        <div class="login-container">

    function txLog(msg, cls = '') {
      const el = document.getElementById('tx-log');
      if (!el) return;
      const entry = document.createElement('div');
      entry.className = 'tx-log-entry ' + cls;
      const time = new Date().toLocaleTimeString('it-IT');
      entry.textContent = '[' + time + '] ' + msg;
      el.prepend(entry);

    async function txStart() {
      const apiKey = state.tx.apiKey.trim();
      if (!apiKey || !apiKey.startsWith('sk-')) {
        showToast('Inserisci una API key OpenAI valida (inizia con sk-)', 'error');
        return;
      }

      state.tx.running = true;
      state.tx.shouldStop = false;
      state.tx.completed = 0;
      state.tx.failed = 0;
      render();
      // Re-set progress bar after render
      const progressEl = document.getElementById('tx-progress-fill');

      const { data: pending, error } = await db
        .from('audio_uploads')
        .select('id, file_path, file_name')
        .eq('transcription_status', 'pending')
        .order('uploaded_at', { ascending: true });

      if (error) { txLog('Errore DB: ' + error.message, 'tx-log-err'); state.tx.running = false; render(); return; }
      if (!pending || pending.length === 0) { txLog('Nessun audio da trascrivere.', 'tx-log-info'); state.tx.running = false; render(); return; }

      state.tx.total = pending.length;
      txLog('Avvio trascrizione di ' + pending.length + ' audio...', 'tx-log-info');

      for (let i = 0; i < pending.length; i++) {
        if (state.tx.shouldStop) { txLog('Fermato dall\'utente.', 'tx-log-warn'); break; }

        const upload = pending[i];
        const name = upload.file_name || upload.file_path.split('/').pop();
        txLog('[' + (i+1) + '/' + pending.length + '] ' + name + '...');

        if (progressEl) progressEl.style.width = ((i / pending.length) * 100) + '%';

        await db.from('audio_uploads').update({ transcription_status: 'processing' }).eq('id', upload.id);

        try {
          const { data: blob, error: dlErr } = await db.storage.from('audio-files').download(upload.file_path);
          if (dlErr) throw new Error('Download: ' + dlErr.message);
          txLog('  Scaricato: ' + (blob.size / 1024).toFixed(0) + 'KB', 'tx-log-info');

          // Retry loop for OpenAI API (max 3 attempts)
          let text = null;
          for (let attempt = 1; attempt <= 3; attempt++) {
            try {
              const formData = new FormData();
              formData.append('file', blob, name);
              formData.append('model', 'whisper-1');
              formData.append('language', 'it');
              formData.append('response_format', 'text');

              const response = await fetch('https://api.openai.com/v1/audio/transcriptions', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + apiKey },
                body: formData
              });

              if (!response.ok) {
                const errBody = await response.text();
                // Don't retry on auth/quota errors
                if (response.status === 401 || response.status === 429) {
                  throw new Error('API ' + response.status + ': ' + errBody.slice(0, 200));
                }
                throw new Error('RETRY:API ' + response.status + ': ' + errBody.slice(0, 200));
              }

              text = await response.text();
              break; // Success
            } catch (fetchErr) {
              if (!fetchErr.message.startsWith('RETRY:') && !fetchErr.message.includes('Load failed') && !fetchErr.message.includes('network') && !fetchErr.message.includes('Failed to fetch')) {
                throw fetchErr; // Non-retryable error
              }
              if (attempt < 3) {
                txLog('  Tentativo ' + attempt + ' fallito, riprovo tra 3s...', 'tx-log-warn');
                await new Promise(r => setTimeout(r, 3000));
              } else {
                throw new Error(fetchErr.message.replace('RETRY:', ''));
              }
            }
          }

          if (!text || text.trim().length === 0) throw new Error('Trascrizione vuota');

          // Save .txt to Storage (with retry on 400)
          const txtPath = upload.file_path.replace(/^uploads\//, 'transcriptions/').replace(/\.[^.]+$/, '.txt');
          const txtBlob = new Blob([text], { type: 'text/plain; charset=utf-8' });
          
          // Try upload, if 400 (already exists) try remove then re-upload
          let uploadErr = null;
          const upRes = await db.storage.from('audio-files').upload(txtPath, txtBlob, { contentType: 'text/plain; charset=utf-8', upsert: true });
          if (upRes.error) {
            await db.storage.from('audio-files').remove([txtPath]);
            const upRes2 = await db.storage.from('audio-files').upload(txtPath, txtBlob, { contentType: 'text/plain; charset=utf-8' });
            if (upRes2.error) uploadErr = upRes2.error;
          }
          if (uploadErr) txLog('  Avviso: file .txt non salvato nello storage', 'tx-log-warn');

          await db.from('audio_uploads').update({
            transcription_status: 'completed',
            transcription: text,
            transcription_file_path: txtPath,
            transcription_error: null,
            transcribed_at: new Date().toISOString()
          }).eq('id', upload.id);

          state.tx.completed++;
          txLog('  OK (' + text.length + ' caratteri)', 'tx-log-ok');

        } catch (err) {
          state.tx.failed++;
          const errMsg = err.message || 'Errore sconosciuto';
          txLog('  ERRORE: ' + errMsg, 'tx-log-err');
          await db.from('audio_uploads').update({
            transcription_status: 'failed',
            transcription_error: errMsg.slice(0, 500)
          }).eq('id', upload.id);
        }

        if (i < pending.length - 1 && !state.tx.shouldStop) {
          await new Promise(r => setTimeout(r, 1000));
        }
      }

      if (progressEl) progressEl.style.width = '100%';
      txLog('Completato! OK: ' + state.tx.completed + ', Errori: ' + state.tx.failed, 'tx-log-info');
      state.tx.running = false;
      await loadUploads();
      render();
    }

    async function txReset() {
      const { error } = await db
        .from('audio_uploads')
        .update({ transcription_status: 'pending', transcription_error: null })

      if (error) { showToast('Errore reset: ' + error.message, 'error'); return; }

      await loadUploads();
      render();
      showToast('Errori resettati');
    }

      const ids = completed.map(u => u.id);
      downloadTexts(ids);

        } else {
          pwd.type = 'password';
          icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';

    function attachDashboardEvents() {
      // Tab navigation
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          state.currentView = tab.dataset.view;
          render();
        });
      });

      // Transcription events (only if in transcription view)
      if (state.currentView === 'transcription') {
        document.getElementById('logout-btn')?.addEventListener('click', handleLogout);
        document.getElementById('tx-api-key')?.addEventListener('input', (e) => {
          state.tx.apiKey = e.target.value;
        });
        document.getElementById('tx-start')?.addEventListener('click', txStart);
        document.getElementById('tx-stop')?.addEventListener('click', () => { state.tx.shouldStop = true; });
        document.getElementById('tx-reset')?.addEventListener('click', txReset);
        document.getElementById('tx-download-all')?.addEventListener('click', txDownloadAll);
        return;
      }

      // File view events below
      // Logout
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
      
      // Search
      document.getElementById('search-input').addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        filterUploads();
        render();
      });
      
      // Location filter
      document.getElementById('location-filter').addEventListener('change', (e) => {
        state.locationFilter = e.target.value;
        filterUploads();
        render();
      });
      
      // Select all
      document.getElementById('select-all')?.addEventListener('change', (e) => {
        if (e.target.checked) {
          state.filteredUploads.forEach(u => state.selectedIds.add(u.id));
        } else {
          state.selectedIds.clear();
        }
        render();
      });
      
      // Row checkboxes
      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const id = e.target.dataset.id;
          if (e.target.checked) {
            state.selectedIds.add(id);
          } else {
            state.selectedIds.delete(id);
          }
          render();
        });
      });
      
      // Sort headers
      document.querySelectorAll('th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
          const field = th.dataset.sort;
          if (state.sortField === field) {
            state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
          } else {
            state.sortField = field;
            state.sortDirection = 'asc';
          }
          filterUploads();
          render();
        });
      });
      
      // Download buttons
      document.querySelectorAll('.audio-download-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          downloadFiles([id]);
        });
      });
      
      // Download audio selected
      document.getElementById('download-audio-btn')?.addEventListener('click', () => {
        downloadFiles([...state.selectedIds]);
      });
      
      // Download text selected
      document.getElementById('download-text-btn')?.addEventListener('click', () => {
        downloadTexts([...state.selectedIds]);
      });
      
      // Delete selected
      document.getElementById('delete-selected-btn')?.addEventListener('click', () => {
        state.deleteModal = { open: true, items: [...state.selectedIds] };
        render();
      });
      
      // Download transcription buttons (single row, from DB)
      document.querySelectorAll('.tx-download-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          downloadTexts([id]);
        });
      });

      // Modal events
      document.getElementById('cancel-delete')?.addEventListener('click', () => {
        state.deleteModal = { open: false, items: [] };
        render();
      });
      
      document.getElementById('confirm-delete')?.addEventListener('click', handleDelete);
    }

    // ========== API FUNCTIONS ==========
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      
      try {
        const { data, error } = await db.auth.signInWithPassword({ email, password });
        
        if (error) throw error;
        
        state.user = data.user;
        await loadUploads();
        render();
      } catch (error) {
        errorEl.textContent = error.message || 'Errore durante il login';
        errorEl.style.display = 'block';
      }
    }

    async function handleLogout() {
      await db.auth.signOut();
      state.user = null;
      state.uploads = [];
      state.filteredUploads = [];
      state.selectedIds.clear();
      render();
    }

    async function loadUploads() {
      try {
        const { data, error } = await db
          .from('audio_uploads')
          .select('*')
          .order('uploaded_at', { ascending: false });
        
        if (error) throw error;
        
        state.uploads = data || [];
        filterUploads();
      } catch (error) {
        console.error('Error loading uploads:', error);
        showToast('Errore nel caricamento dei file', 'error');
      }
    }

    function filterUploads() {
      let filtered = [...state.uploads];
      
      // Search
      if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        filtered = filtered.filter(u => 
          u.name.toLowerCase().includes(q) ||
          u.email.toLowerCase().includes(q) ||
          u.file_name.toLowerCase().includes(q)
        );
      }
      
      // Location
      if (state.locationFilter !== 'all') {
        filtered = filtered.filter(u => u.location === state.locationFilter);
      }
      
      // Sort
      filtered.sort((a, b) => {
        let aVal = a[state.sortField] || '';
        let bVal = b[state.sortField] || '';
        
        if (state.sortField === 'uploaded_at') {
          aVal = new Date(aVal).getTime();
          bVal = new Date(bVal).getTime();
        } else {
          aVal = aVal.toString().toLowerCase();
          bVal = bVal.toString().toLowerCase();
        }
        
        if (state.sortDirection === 'asc') {
          return aVal > bVal ? 1 : -1;
        } else {
          return aVal < bVal ? 1 : -1;
        }
      });
      
      state.filteredUploads = filtered;
    }

    async function downloadFiles(ids) {
      const uploads = state.uploads.filter(u => ids.includes(u.id));
      
      for (const upload of uploads) {
        try {
          const { data } = db.storage
            .from('audio-files')
            .getPublicUrl(upload.file_path);
          
          // Fetch file as blob to force download
          const response = await fetch(data.publicUrl);
          const blob = await response.blob();
          const blobUrl = window.URL.createObjectURL(blob);
          
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = upload.file_name;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          
          // Cleanup blob URL
          window.URL.revokeObjectURL(blobUrl);
          
          // Small delay between downloads
          await new Promise(r => setTimeout(r, 300));
        } catch (error) {
          console.error('Download error:', error);
        }
      }
      
      showToast(`${uploads.length} file scaricati`);
    }

    function txFileName(upload) {
      const loc = (upload.location || '').replace(/\s+/g, '_').replace(/-/g, '_');
      const date = upload.uploaded_at ? new Date(upload.uploaded_at).toISOString().split('T')[0] : '';
      return (loc + '_' + date + '.txt').replace(/_{2,}/g, '_').replace(/^_/, '');
    }

    async function downloadTexts(ids) {
      const uploads = state.uploads.filter(u => ids.includes(u.id) && u.transcription);
      
      if (uploads.length === 0) {
        showToast('Nessuna trascrizione disponibile per i file selezionati', 'error');
        return;
      }

      for (const upload of uploads) {
        try {
          const fileName = txFileName(upload);
          const blob = new Blob([upload.transcription], { type: 'text/plain; charset=utf-8' });
          const blobUrl = window.URL.createObjectURL(blob);
          
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = fileName;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          window.URL.revokeObjectURL(blobUrl);
          
          await new Promise(r => setTimeout(r, 300));
        } catch (error) {
          console.error('Download text error:', error);
        }
      }
      
      showToast(`${uploads.length} trascrizioni scaricate`);
    }

    async function handleDelete() {
      const ids = state.deleteModal.items;
      
      try {
        for (const id of ids) {
          const upload = state.uploads.find(u => u.id === id);
          if (!upload) continue;
          
          // Delete from storage
          if (upload.file_path) {
            await db.storage.from('audio-files').remove([upload.file_path]);
          }
          if (upload.notes_audio_path) {
            await db.storage.from('audio-files').remove([upload.notes_audio_path]);
          }
          
          // Delete from DB
          await db.from('audio_uploads').delete().eq('id', id);
        }
        
        // Update state
        state.uploads = state.uploads.filter(u => !ids.includes(u.id));
        ids.forEach(id => state.selectedIds.delete(id));
        filterUploads();
        
        state.deleteModal = { open: false, items: [] };
        showToast(`${ids.length} file eliminati`);
        render();
      } catch (error) {
        console.error('Delete error:', error);
        showToast('Errore durante l\'eliminazione', 'error');
        state.deleteModal = { open: false, items: [] };
        render();
      }
    }

    function showToast(message, type = 'success') {
      state.toast = { show: true, message, type };
      render();
      
      setTimeout(() => {
        state.toast = { show: false, message: '', type: 'success' };
        render();
      }, 3000);
    }

    // ========== INIT ==========
    async function init() {
      // Check existing session
      const { data: { session } } = await db.auth.getSession();
      
      if (session) {
        state.user = session.user;
        await loadUploads();
      }
      
      state.loading = false;
      render();
      
      // Auto-refresh ogni 30 secondi
      setInterval(async () => {
        if (state.user) {
          await loadUploads();
          render();
        }
      }, 30000);
    }

    init();
  </script>
</body>
</html>
